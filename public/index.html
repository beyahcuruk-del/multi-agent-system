<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
  <title>AI Trading Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0a0a0a;
      --bg-panel: #111111;
      --bg-surface: #161616;
      --bg-elevated: #1c1c1c;
      --bg-hover: #222;
      --text-primary: #ececec;
      --text-secondary: #999;
      --text-muted: #555;
      --green: #00d26a;
      --green-dim: rgba(0,210,106,0.12);
      --red: #ff4757;
      --red-dim: rgba(255,71,87,0.12);
      --accent: #6366f1;
      --accent-bright: #818cf8;
      --yellow: #ffd32a;
      --border: rgba(255,255,255,0.06);
      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html { font-size: 14px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font);
      background: var(--bg-deep);
      color: var(--text-primary);
      height: 100vh; height: 100dvh;
      overflow: hidden;
    }

    /* ===== LAYOUT ===== */
    .app {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      height: 100vh; height: 100dvh;
    }

    /* ===== COINS LIST ===== */
    .coins-panel {
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .coins-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .coins-header h1 {
      font-size: 15px; font-weight: 700;
      background: linear-gradient(135deg, var(--green), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .coins-header .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .coins-search {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .coins-search input {
      width: 100%; padding: 8px 12px;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-primary);
      font-family: var(--font); font-size: 12px; outline: none;
    }
    .coins-search input:focus { border-color: var(--accent); }
    .coins-search input::placeholder { color: var(--text-muted); }

    .coins-list {
      flex: 1; overflow-y: auto;
    }
    .coins-list::-webkit-scrollbar { width: 4px; }
    .coins-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .coin-item {
      display: grid;
      grid-template-columns: 24px 1fr auto auto;
      align-items: center; gap: 10px;
      padding: 10px 16px;
      cursor: pointer; transition: background 0.1s;
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }
    .coin-item:hover { background: var(--bg-hover); }
    .coin-item.active { background: rgba(99,102,241,0.08); border-left: 2px solid var(--accent); }

    .coin-rank {
      font-size: 10px; color: var(--text-muted);
      font-family: var(--mono); text-align: center;
    }
    .coin-info { min-width: 0; }
    .coin-name {
      font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .coin-symbol {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; font-family: var(--mono);
    }
    .coin-price {
      font-size: 12px; font-family: var(--mono);
      font-weight: 500; text-align: right;
    }
    .coin-change {
      font-size: 11px; font-family: var(--mono);
      font-weight: 600; text-align: right;
      padding: 2px 6px; border-radius: 4px;
      min-width: 56px;
    }
    .coin-change.positive { color: var(--green); background: var(--green-dim); }
    .coin-change.negative { color: var(--red); background: var(--red-dim); }

    .coins-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      font-size: 10px; color: var(--text-muted);
      text-align: center;
    }

    /* ===== MAIN CHART ===== */
    .main-panel {
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .chart-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
      flex-wrap: wrap;
    }
    .chart-coin-info {
      display: flex; align-items: center; gap: 12px;
    }
    .chart-coin-img {
      width: 32px; height: 32px; border-radius: 50%;
    }
    .chart-coin-name { font-size: 18px; font-weight: 700; }
    .chart-coin-symbol { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }

    .chart-price-big {
      font-size: 28px; font-weight: 700;
      font-family: var(--mono);
      margin-left: auto;
    }
    .chart-change-badge {
      font-size: 14px; font-weight: 600;
      padding: 4px 10px; border-radius: 6px;
      font-family: var(--mono);
    }
    .chart-change-badge.positive { color: var(--green); background: var(--green-dim); }
    .chart-change-badge.negative { color: var(--red); background: var(--red-dim); }

    .timeframe-tabs {
      display: flex; gap: 4px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
    }
    .tf-tab {
      padding: 10px 14px;
      background: none; border: none;
      color: var(--text-muted); font-family: var(--font);
      font-size: 12px; font-weight: 600;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tf-tab:hover { color: var(--text-secondary); }
    .tf-tab.active { color: var(--accent-bright); border-bottom-color: var(--accent); }

    .chart-area {
      flex: 1; padding: 16px 20px;
      min-height: 0; position: relative;
    }
    .chart-area canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .chart-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      padding: 0 20px 16px;
    }
    .stat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .stat-label {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 14px; font-weight: 600;
      font-family: var(--mono);
    }

    /* ===== AI PANEL ===== */
    .ai-panel {
      background: var(--bg-panel);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .ai-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .ai-header h2 {
      font-size: 14px; font-weight: 600;
    }
    .ai-header .ai-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
    }

    .ai-content {
      flex: 1; overflow-y: auto; padding: 16px;
    }
    .ai-content::-webkit-scrollbar { width: 4px; }
    .ai-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .ai-analyze-btn {
      display: block; width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border: none; border-radius: 10px;
      color: #fff; font-family: var(--font);
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      margin-bottom: 16px;
    }
    .ai-analyze-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,0.3); }
    .ai-analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .ai-result {
      font-size: 12px; line-height: 1.6;
      color: var(--text-secondary);
      white-space: pre-wrap;
    }
    .ai-result strong { color: var(--text-primary); }
    .ai-result .signal {
      display: inline-block;
      padding: 3px 8px; border-radius: 4px;
      font-weight: 600; font-size: 11px;
    }
    .signal.buy { background: var(--green-dim); color: var(--green); }
    .signal.sell { background: var(--red-dim); color: var(--red); }
    .signal.hold { background: rgba(255,211,42,0.12); color: var(--yellow); }

    .ai-thinking {
      display: flex; align-items: center; gap: 8px;
      color: var(--text-muted); font-size: 12px;
      padding: 20px 0;
    }
    .ai-spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .ai-chat-area {
      border-top: 1px solid var(--border);
      padding: 12px;
    }
    .ai-chat-input {
      display: flex; gap: 8px;
    }
    .ai-chat-input input {
      flex: 1; padding: 10px 12px;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-primary);
      font-family: var(--font); font-size: 12px; outline: none;
    }
    .ai-chat-input input:focus { border-color: var(--accent); }
    .ai-chat-input input::placeholder { color: var(--text-muted); }
    .ai-chat-send {
      padding: 10px 14px;
      background: var(--accent); border: none; border-radius: 8px;
      color: #fff; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .ai-chat-send:hover { background: var(--accent-bright); }

    /* Welcome state */
    .ai-welcome {
      text-align: center;
      padding: 40px 16px;
      color: var(--text-muted);
    }
    .ai-welcome-icon { font-size: 32px; margin-bottom: 12px; }
    .ai-welcome h3 { font-size: 14px; color: var(--text-secondary); margin-bottom: 6px; }
    .ai-welcome p { font-size: 12px; line-height: 1.5; }

    /* Loading state */
    .loading-screen {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column; gap: 16px;
    }
    .loading-screen .spinner { width: 24px; height: 24px; }
    .loading-screen p { color: var(--text-muted); font-size: 13px; }

    /* ===== MOBILE ===== */
    .mobile-tabs {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 100;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      padding: 8px 0;
      padding-bottom: env(safe-area-inset-bottom, 8px);
    }
    .mobile-tabs-inner {
      display: flex; justify-content: space-around;
    }
    .mobile-tab {
      background: none; border: none;
      color: var(--text-muted); font-size: 10px;
      font-family: var(--font); font-weight: 600;
      cursor: pointer; padding: 6px 12px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .mobile-tab.active { color: var(--accent-bright); }
    .mobile-tab span { font-size: 16px; }

    @media (max-width: 1024px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr;
      }
      .coins-panel, .ai-panel {
        display: none;
        position: fixed; inset: 0; z-index: 50;
      }
      .coins-panel.mobile-show, .ai-panel.mobile-show { display: flex; }
      .main-panel.mobile-show { display: flex; }
      .mobile-tabs { display: block; }
      .chart-header { padding: 12px 16px; }
      .chart-area { padding: 12px 16px; }
      .chart-stats { padding: 0 16px 12px; }
    }
  </style>
</head>
<body>

<div class="app" id="app">
  <!-- COINS LIST -->
  <aside class="coins-panel" id="coinsPanel">
    <div class="coins-header">
      <div class="live-dot"></div>
      <h1>AI Trading Terminal</h1>
    </div>
    <div class="coins-search">
      <input type="text" id="searchInput" placeholder="Search coin..." oninput="filterCoins()" />
    </div>
    <div class="coins-list" id="coinsList">
      <div class="loading-screen"><div class="ai-spinner"></div><p>Loading coins...</p></div>
    </div>
    <div class="coins-footer">Data from CoinGecko · Auto-refresh 30s</div>
  </aside>

  <!-- MAIN CHART -->
  <main class="main-panel" id="mainPanel">
    <div id="chartWelcome" class="loading-screen">
      <div class="ai-welcome">
        <div class="ai-welcome-icon">📊</div>
        <h3>Select a coin</h3>
        <p>Choose a coin from the list to view chart and AI analysis</p>
      </div>
    </div>

    <div id="chartContent" style="display:none; flex-direction:column; height:100%;">
      <div class="chart-header">
        <div class="chart-coin-info">
          <img class="chart-coin-img" id="coinImg" src="" />
          <div>
            <div class="chart-coin-name" id="coinTitle">Bitcoin</div>
            <div class="chart-coin-symbol" id="coinSym">BTC</div>
          </div>
        </div>
        <div class="chart-price-big" id="coinPrice">$0</div>
        <div class="chart-change-badge" id="coinChange">0%</div>
      </div>

      <div class="timeframe-tabs">
        <button class="tf-tab" onclick="setTimeframe('1')">1D</button>
        <button class="tf-tab active" onclick="setTimeframe('7')">7D</button>
        <button class="tf-tab" onclick="setTimeframe('30')">30D</button>
        <button class="tf-tab" onclick="setTimeframe('90')">90D</button>
        <button class="tf-tab" onclick="setTimeframe('365')">1Y</button>
      </div>

      <div class="chart-area">
        <canvas id="priceChart"></canvas>
      </div>

      <div class="chart-stats" id="chartStats"></div>
    </div>
  </main>

  <!-- AI PANEL -->
  <aside class="ai-panel" id="aiPanel">
    <div class="ai-header">
      <div class="ai-dot"></div>
      <h2>AI Analysis</h2>
    </div>
    <div class="ai-content" id="aiContent">
      <div class="ai-welcome">
        <div class="ai-welcome-icon">🤖</div>
        <h3>AI Trading Assistant</h3>
        <p>Select a coin and click "Analyze" to get AI-powered trading insights</p>
      </div>
    </div>
    <div class="ai-chat-area">
      <div class="ai-chat-input">
        <input type="text" id="chatInput" placeholder="Ask about any coin..." onkeydown="if(event.key==='Enter')sendChat()" />
        <button class="ai-chat-send" onclick="sendChat()">Ask</button>
      </div>
    </div>
  </aside>
</div>

<!-- MOBILE TABS -->
<div class="mobile-tabs">
  <div class="mobile-tabs-inner">
    <button class="mobile-tab active" onclick="showMobilePanel('coins')" id="mtCoins">
      <span>📋</span>Coins
    </button>
    <button class="mobile-tab" onclick="showMobilePanel('chart')" id="mtChart">
      <span>📊</span>Chart
    </button>
    <button class="mobile-tab" onclick="showMobilePanel('ai')" id="mtAi">
      <span>🤖</span>AI
    </button>
  </div>
</div>

<script>
// ===== STATE =====
let coins = [];
let selectedCoin = null;
let chart = null;
let currentDays = '7';

// ===== INIT =====
loadCoins();
setInterval(loadCoins, 30000);

async function loadCoins() {
  try {
    const res = await fetch('/api/coins');
    if (!res.ok) throw new Error('Failed');
    coins = await res.json();
    renderCoinsList();
  } catch (err) {
    console.error('Failed to load coins:', err);
  }
}

function renderCoinsList() {
  const list = document.getElementById('coinsList');
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = coins.filter(c =>
    c.name.toLowerCase().includes(search) ||
    c.symbol.toLowerCase().includes(search)
  );

  list.innerHTML = filtered.map(c => {
    const change = c.price_change_percentage_24h || 0;
    const changeClass = change >= 0 ? 'positive' : 'negative';
    const price = formatPrice(c.current_price);
    const active = selectedCoin?.id === c.id ? 'active' : '';

    return `<div class="coin-item ${active}" onclick="selectCoin('${c.id}')">
      <div class="coin-rank">${c.market_cap_rank}</div>
      <div class="coin-info">
        <div class="coin-name">${c.name}</div>
        <div class="coin-symbol">${c.symbol}</div>
      </div>
      <div class="coin-price">${price}</div>
      <div class="coin-change ${changeClass}">${change >= 0 ? '+' : ''}${change.toFixed(1)}%</div>
    </div>`;
  }).join('');
}

function filterCoins() { renderCoinsList(); }

// ===== SELECT COIN =====
async function selectCoin(id) {
  const coin = coins.find(c => c.id === id);
  if (!coin) return;
  selectedCoin = coin;
  renderCoinsList();

  // Show chart
  document.getElementById('chartWelcome').style.display = 'none';
  const content = document.getElementById('chartContent');
  content.style.display = 'flex';

  // Update header
  document.getElementById('coinImg').src = coin.image || '';
  document.getElementById('coinTitle').textContent = coin.name;
  document.getElementById('coinSym').textContent = coin.symbol?.toUpperCase();
  document.getElementById('coinPrice').textContent = formatPrice(coin.current_price);

  const change = coin.price_change_percentage_24h || 0;
  const changeEl = document.getElementById('coinChange');
  changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
  changeEl.className = `chart-change-badge ${change >= 0 ? 'positive' : 'negative'}`;

  // Load chart data
  await loadChart(id, currentDays);

  // Load stats
  await loadCoinDetails(id);

  // Mobile: switch to chart
  if (window.innerWidth <= 1024) showMobilePanel('chart');
}

async function loadChart(id, days) {
  try {
    const res = await fetch(`/api/coins/${id}?days=${days}`);
    const data = await res.json();

    const prices = data.chart || [];
    const labels = prices.map(p => {
      const d = new Date(p[0]);
      if (days <= 1) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (days <= 7) return d.toLocaleDateString([], { weekday: 'short', hour: '2-digit', minute: '2-digit' });
      return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    });
    const values = prices.map(p => p[1]);

    const isPositive = values[values.length - 1] >= values[0];
    const lineColor = isPositive ? '#00d26a' : '#ff4757';
    const fillColor = isPositive ? 'rgba(0,210,106,0.08)' : 'rgba(255,71,87,0.08)';

    if (chart) chart.destroy();

    const ctx = document.getElementById('priceChart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: values,
          borderColor: lineColor,
          backgroundColor: fillColor,
          borderWidth: 2,
          fill: true,
          tension: 0.3,
          pointRadius: 0,
          pointHitRadius: 10
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1c1c1c',
            titleColor: '#999',
            bodyColor: '#ececec',
            bodyFont: { family: 'JetBrains Mono', size: 12 },
            borderColor: 'rgba(255,255,255,0.06)',
            borderWidth: 1,
            padding: 10,
            callbacks: {
              label: ctx => '$' + ctx.parsed.y.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.03)' },
            ticks: { color: '#555', maxTicksLimit: 8, font: { size: 10 } }
          },
          y: {
            grid: { color: 'rgba(255,255,255,0.03)' },
            ticks: {
              color: '#555', font: { family: 'JetBrains Mono', size: 10 },
              callback: v => '$' + v.toLocaleString()
            }
          }
        }
      }
    });

    // Update stats with fresh data
    if (data.current_price) {
      document.getElementById('coinPrice').textContent = formatPrice(data.current_price);
      const ch = data.price_change_percentage_24h || 0;
      const chEl = document.getElementById('coinChange');
      chEl.textContent = `${ch >= 0 ? '+' : ''}${ch.toFixed(2)}%`;
      chEl.className = `chart-change-badge ${ch >= 0 ? 'positive' : 'negative'}`;
    }

  } catch (err) {
    console.error('Chart load error:', err);
  }
}

async function loadCoinDetails(id) {
  try {
    const res = await fetch(`/api/coins/${id}`);
    const data = await res.json();

    const stats = document.getElementById('chartStats');
    stats.innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Market Cap</div>
        <div class="stat-value">${formatLargeNumber(data.market_cap)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">24h Volume</div>
        <div class="stat-value">${formatLargeNumber(data.total_volume)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">24h High</div>
        <div class="stat-value" style="color:var(--green)">${formatPrice(data.high_24h)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">24h Low</div>
        <div class="stat-value" style="color:var(--red)">${formatPrice(data.low_24h)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ATH</div>
        <div class="stat-value">${formatPrice(data.ath)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Circulating</div>
        <div class="stat-value">${formatLargeNumber(data.circulating_supply)}</div>
      </div>
    `;
  } catch (err) {
    console.error('Details load error:', err);
  }
}

function setTimeframe(days) {
  currentDays = days;
  document.querySelectorAll('.tf-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  if (selectedCoin) loadChart(selectedCoin.id, days);
}

// ===== AI ANALYSIS =====
async function analyzeCurrentCoin() {
  if (!selectedCoin) return;

  const btn = document.getElementById('analyzeBtn');
  if (btn) btn.disabled = true;

  const content = document.getElementById('aiContent');
  content.innerHTML = `<div class="ai-thinking"><div class="ai-spinner"></div>Analyzing ${selectedCoin.name}...</div>`;

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        coin: selectedCoin.name,
        price: selectedCoin.current_price,
        change24h: selectedCoin.price_change_percentage_24h?.toFixed(2),
        change7d: selectedCoin.price_change_percentage_7d?.toFixed(2),
        marketCap: selectedCoin.market_cap,
        volume: selectedCoin.total_volume,
        high24h: selectedCoin.high_24h,
        low24h: selectedCoin.low_24h
      })
    });

    const data = await res.json();
    content.innerHTML = `
      <button class="ai-analyze-btn" id="analyzeBtn" onclick="analyzeCurrentCoin()">🔄 Re-analyze ${selectedCoin.name}</button>
      <div class="ai-result">${formatAnalysis(data.analysis)}</div>
    `;
  } catch (err) {
    content.innerHTML = `
      <button class="ai-analyze-btn" id="analyzeBtn" onclick="analyzeCurrentCoin()">🔄 Try Again</button>
      <div class="ai-result" style="color:var(--red)">Error: ${err.message}</div>
    `;
  }

  if (btn) btn.disabled = false;
}

// Auto-analyze when coin selected
const origSelectCoin = selectCoin;
selectCoin = async function(id) {
  await origSelectCoin(id);
  const content = document.getElementById('aiContent');
  content.innerHTML = `
    <button class="ai-analyze-btn" id="analyzeBtn" onclick="analyzeCurrentCoin()">🤖 Analyze ${selectedCoin.name}</button>
    <div class="ai-welcome">
      <div class="ai-welcome-icon">📊</div>
      <h3>${selectedCoin.name}</h3>
      <p>Click "Analyze" to get AI-powered trading insights for ${selectedCoin.name}</p>
    </div>
  `;
};

// ===== CHAT =====
async function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const content = document.getElementById('aiContent');
  const userMsg = `<div style="margin-bottom:12px;padding:8px 10px;background:var(--bg-elevated);border-radius:8px;font-size:12px;color:var(--text-primary);"><strong>You:</strong> ${escHtml(text)}</div>`;
  content.innerHTML = userMsg + content.innerHTML;
  content.innerHTML = `<div class="ai-thinking"><div class="ai-spinner"></div>Thinking...</div>` + content.innerHTML;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content: text }] })
    });
    const data = await res.json();

    // Remove thinking
    const thinking = content.querySelector('.ai-thinking');
    if (thinking) thinking.remove();

    const aiMsg = `<div style="margin-bottom:12px;padding:8px 10px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text-secondary);line-height:1.6;"><strong style="color:var(--accent-bright)">AI:</strong> ${formatAnalysis(data.content)}</div>`;
    content.innerHTML = aiMsg + userMsg + content.innerHTML;
  } catch (err) {
    const thinking = content.querySelector('.ai-thinking');
    if (thinking) thinking.remove();
    content.innerHTML = `<div style="color:var(--red);font-size:12px;margin-bottom:12px;">Error: ${err.message}</div>` + content.innerHTML;
  }
}

// ===== MOBILE =====
function showMobilePanel(panel) {
  document.getElementById('coinsPanel').classList.toggle('mobile-show', panel === 'coins');
  document.getElementById('mainPanel').classList.toggle('mobile-show', panel === 'chart');
  document.getElementById('aiPanel').classList.toggle('mobile-show', panel === 'ai');
  document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(panel === 'coins' ? 'mtCoins' : panel === 'chart' ? 'mtChart' : 'mtAi').classList.add('active');
}

// ===== HELPERS =====
function formatPrice(n) {
  if (!n) return '$0';
  if (n >= 1) return '$' + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (n >= 0.01) return '$' + n.toFixed(4);
  return '$' + n.toFixed(8);
}

function formatLargeNumber(n) {
  if (!n) return '—';
  if (n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
  return '$' + n.toLocaleString();
}

function formatAnalysis(text) {
  if (!text) return '';
  let html = escHtml(text);
  // Bold headers
  html = html.replace(/^(\d+\.\s.*$)/gm, '<strong>$1</strong>');
  // Buy/Sell signals
  html = html.replace(/(Strong Buy|Buy)/g, '<span class="signal buy">$1</span>');
  html = html.replace(/(Strong Sell|Sell)/g, '<span class="signal sell">$1</span>');
  html = html.replace(/(Hold)/g, '<span class="signal hold">$1</span>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function escHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
</script>
