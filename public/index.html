<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
  <title>Multi-Agent System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0a0a0a;
      --bg-sidebar: #111111;
      --bg-surface: #1a1a1a;
      --bg-elevated: #222222;
      --bg-user-bubble: #2a2a5a;
      --bg-ai-bubble: #1e1e1e;
      --text-primary: #ececec;
      --text-secondary: #b0b0b0;
      --text-tertiary: #777;
      --text-muted: #555;
      --accent: #6366f1;
      --accent-bright: #818cf8;
      --accent-hover: #a5b4fc;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #eab308;
      --border: rgba(255,255,255,0.08);
      --border-subtle: rgba(255,255,255,0.04);
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
      --sidebar-w: 260px;
      --input-h: 64px;
    }

    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font);
      background: var(--bg-deep);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .sidebar-header {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .sidebar-logo {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .sidebar-brand { font-size: 14px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.2px; }

    .new-chat-btn {
      margin: 12px 12px 8px;
      padding: 10px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: all 0.15s;
    }
    .new-chat-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }

    .sidebar-section-label {
      padding: 12px 16px 6px;
      font-size: 10px; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px;
    }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .history-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 2px;
      transition: all 0.1s;
    }
    .history-item:hover { background: rgba(255,255,255,0.04); }
    .history-item.active { background: rgba(99,102,241,0.12); }
    .history-goal {
      font-size: 13px; font-weight: 500;
      color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .history-item.active .history-goal { color: var(--text-primary); }
    .history-meta {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; color: var(--text-muted);
    }
    .history-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .history-dot.completed { background: var(--green); }
    .history-dot.partial { background: var(--yellow); }
    .history-dot.failed { background: var(--red); }
    .history-empty {
      padding: 24px 12px; text-align: center;
      font-size: 12px; color: var(--text-muted);
    }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border-subtle);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-user {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-secondary); font-weight: 500;
    }
    .sidebar-user-dot {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; color: #fff;
    }
    .sidebar-footer-btns { display: flex; gap: 4px; }
    .icon-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 6px; border-radius: 6px;
      font-size: 14px; transition: all 0.15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.06); color: var(--text-secondary); }

    /* ===== MAIN CHAT ===== */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 6px; }

    /* Welcome */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 40px 20px;
      text-align: center;
    }
    .welcome-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.6;
    }
    .welcome h2 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.4px;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .welcome p {
      font-size: 14px;
      color: var(--text-tertiary);
      max-width: 380px;
      line-height: 1.5;
    }

    /* Messages */
    .msg-row {
      padding: 6px 0;
      animation: msgIn 0.25s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .msg-user .msg-container {
      display: flex;
      justify-content: flex-end;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 80%;
      word-break: break-word;
    }

    .msg-user .msg-bubble {
      background: var(--bg-user-bubble);
      color: var(--text-primary);
      border-bottom-right-radius: 4px;
    }

    .msg-ai .msg-bubble {
      background: var(--bg-ai-bubble);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border-subtle);
      max-width: 100%;
    }

    .msg-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msg-label.user-label { color: var(--accent-bright); justify-content: flex-end; }
    .msg-label.ai-label { color: var(--green); }

    /* Thinking / Progress */
    .thinking-block {
      margin-top: 10px;
    }
    .thinking-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 8px;
      cursor: pointer;
    }
    .thinking-header:hover { color: var(--text-secondary); }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 3px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-bright));
      width: 0%;
      transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
      border-radius: 3px;
    }

    .step-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      color: var(--text-tertiary);
      padding: 3px 0;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .step-icon {
      width: 16px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; margin-top: 1px;
    }
    .step-icon.planning { color: var(--accent-bright); }
    .step-icon.task { color: #38bdf8; }
    .step-icon.success { color: var(--green); }
    .step-icon.fail { color: var(--red); }
    .step-icon.info { color: var(--text-muted); }

    /* Result summary */
    .result-summary {
      margin-top: 12px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
    }
    .result-stats {
      display: flex;
      gap: 16px;
      margin-bottom: 10px;
    }
    .result-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .result-stat-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    .result-stat-value {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .result-stat-value.green { color: var(--green); }
    .result-stat-value.red { color: var(--red); }
    .result-stat-value.accent { color: var(--accent-bright); }

    .result-tasks {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .result-task {
      padding: 8px 10px;
      background: var(--bg-deep);
      border-radius: 6px;
      font-size: 12px;
    }
    .result-task-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .result-task-dot {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .result-task-dot.completed { background: var(--green); }
    .result-task-dot.failed { background: var(--red); }
    .result-task-name {
      font-weight: 500;
      color: var(--text-secondary);
      font-size: 12px;
    }
    .result-task-type {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.04);
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: auto;
      text-transform: uppercase;
    }
    .result-task-output {
      font-size: 11px;
      line-height: 1.5;
      color: var(--text-tertiary);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 100px;
      overflow-y: auto;
      font-family: var(--mono);
      padding: 6px 8px;
      background: rgba(255,255,255,0.01);
      border-radius: 4px;
    }

    /* ===== INPUT BAR ===== */
    .input-bar {
      padding: 12px 24px 20px;
      background: var(--bg-deep);
      border-top: 1px solid var(--border-subtle);
    }
    .input-bar-inner {
      max-width: 720px;
      margin: 0 auto;
    }
    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(99,102,241,0.2), 0 4px 16px rgba(0,0,0,0.2);
    }
    .input-box textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.5;
      max-height: 120px;
      min-height: 24px;
      min-width: 0;
      padding: 4px 0;
      word-break: normal;
      overflow-wrap: break-word;
      white-space: normal;
    }
    .input-box textarea::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 34px; height: 34px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      font-size: 16px;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent-bright); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .input-hint {
      text-align: center;
      margin-top: 8px;
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ===== AUTH MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 360px; max-width: 90vw;
      padding: 28px;
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .modal p.sub { font-size: 13px; color: var(--text-tertiary); margin-bottom: 20px; }
    .modal label {
      display: block; font-size: 11px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .modal input[type="text"],
    .modal input[type="password"] {
      width: 100%; background: var(--bg-deep); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; color: var(--text-primary);
      font-family: var(--font); font-size: 14px; outline: none;
      margin-bottom: 14px; transition: border-color 0.15s;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal .error-msg { font-size: 12px; color: var(--red); margin-bottom: 10px; display: none; }
    .modal .error-msg.active { display: block; }
    .modal-actions { display: flex; gap: 8px; margin-top: 6px; }
    .btn-accent {
      background: var(--accent); border: none; color: #fff;
      border-radius: 8px; padding: 10px 16px;
      font-family: var(--font); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s; flex: 1;
    }
    .btn-accent:hover { background: var(--accent-bright); }
    .btn-ghost {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text-secondary); border-radius: 8px; padding: 10px 16px;
      font-family: var(--font); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
    .modal-switch {
      text-align: center; margin-top: 14px;
      font-size: 13px; color: var(--text-tertiary);
    }
    .modal-switch a { color: var(--accent-bright); cursor: pointer; text-decoration: none; }
    .modal-switch a:hover { color: var(--accent-hover); }

    /* ===== MOBILE SIDEBAR TOGGLE ===== */
    .mobile-toggle {
      display: none;
      position: fixed; top: 10px; left: 10px; z-index: 150;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px;
      color: var(--text-secondary); cursor: pointer;
      font-size: 16px;
    }
    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 90;
      background: rgba(0,0,0,0.5);
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: 0; top: 0; z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        width: 280px;
        display: none;
      }
      .sidebar.open { transform: translateX(0); display: flex; }
      .sidebar-overlay.open { display: block; }
      .mobile-toggle { display: flex; }

      .chat-main { height: 100vh; height: 100dvh; width: 100%; }
      .chat-messages {
        padding: 48px 0 8px;
        -webkit-overflow-scrolling: touch;
      }
      .msg-container { padding: 0 12px; }
      .msg-bubble { font-size: 13px; padding: 10px 14px; max-width: 90%; }
      .msg-label { font-size: 10px; }

      .welcome h2 { font-size: 18px; }
      .welcome p { font-size: 13px; }
      .welcome { padding: 24px 16px; }

      .input-bar {
        padding: 8px 12px;
        padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
      }
      .input-bar-inner { max-width: 100%; }
      .input-box {
        padding: 6px 10px;
        border-radius: 12px;
      }
      .input-box textarea { font-size: 16px; word-break: normal; overflow-wrap: break-word; min-width: 0; }
      .send-btn { width: 36px; height: 36px; border-radius: 8px; font-size: 16px; flex-shrink: 0; }
      .input-hint { display: none; }

      .result-stats { gap: 10px; flex-wrap: wrap; }
      .result-stat-value { font-size: 16px; }
      .result-task-output { font-size: 10px; max-height: 80px; }
    }
  </style>
</head>
<body>

  <!-- MOBILE TOGGLE -->
  <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">🧠</div>
      <span class="sidebar-brand">Multi-Agent</span>
    </div>

    <button class="new-chat-btn" onclick="newChat()">
      <span>＋</span> New chat
    </button>

    <div class="sidebar-section-label">History</div>
    <div class="history-list" id="historyList">
      <div class="history-empty">No conversations yet</div>
    </div>

    <div class="sidebar-footer" id="sidebarFooter">
      <div class="sidebar-user" id="sidebarUser" style="display:none;">
        <div class="sidebar-user-dot" id="userDot">U</div>
        <span id="userName">user</span>
      </div>
      <div class="sidebar-footer-btns" id="authBtns">
        <button class="icon-btn" onclick="showModal('login')" title="Log in">🔑</button>
        <button class="icon-btn" onclick="showModal('signup')" title="Sign up">✏️</button>
      </div>
      <div class="sidebar-footer-btns" id="userBtns" style="display:none;">
        <button class="icon-btn" onclick="logout()" title="Logout">🚪</button>
      </div>
    </div>
  </aside>

  <!-- AUTH MODAL -->
  <div class="modal-overlay" id="authModal">
    <div class="modal">
      <h2 id="modalTitle">Sign up</h2>
      <p class="sub" id="modalSub">Create an account to save your session history.</p>
      <div class="error-msg" id="authError"></div>
      <label>Username</label>
      <input type="text" id="authUser" placeholder="e.g. garok" autocomplete="username" />
      <label>Password</label>
      <input type="password" id="authPass" placeholder="••••" autocomplete="current-password" />
      <div class="modal-actions">
        <button class="btn-accent" id="authSubmit" onclick="submitAuth()">Sign up</button>
        <button class="btn-ghost" onclick="hideModal()">Cancel</button>
      </div>
      <div class="modal-switch" id="modalSwitch">
        Already have an account? <a onclick="toggleAuthMode()">Log in</a>
      </div>
    </div>
  </div>

  <!-- MAIN CHAT -->
  <main class="chat-main">
    <div class="chat-messages" id="chatMessages">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">🧠</div>
        <h2>What do you want to build?</h2>
        <p>Describe your goal. AI agents will plan, execute, and evaluate — autonomously.</p>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-bar-inner">
        <div class="input-box">
          <textarea id="goalInput" rows="1" placeholder="Describe your goal..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="runBtn" onclick="run()">↑</button>
        </div>
        <div class="input-hint">Enter to send · Shift+Enter for new line</div>
      </div>
    </div>
  </main>

<script>
// ===== STATE =====
let token = localStorage.getItem('mas_token') || null;
let localUser = localStorage.getItem('mas_user') || null;
let localHistory = JSON.parse(localStorage.getItem('mas_history') || '[]');
let authMode = 'signup';
let abortController = null;
let currentSessionId = null;
let isRunning = false;

// ===== INIT =====
init();

async function init() {
  if (token) {
    try {
      const res = await fetch('/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!res.ok) throw new Error();
      const data = await res.json();
      localUser = data.username;
      localStorage.setItem('mas_user', localUser);
      showLoggedIn();
      syncHistoryToServer();
    } catch {
      if (localUser) { showLoggedIn(); }
      else { token = null; localStorage.removeItem('mas_token'); showLoggedOut(); }
    }
  } else if (localUser) { showLoggedIn(); }
  else { showLoggedOut(); }
  renderHistory();
}

function showLoggedIn() {
  document.getElementById('sidebarUser').style.display = 'flex';
  document.getElementById('userDot').textContent = localUser[0].toUpperCase();
  document.getElementById('userName').textContent = localUser;
  document.getElementById('authBtns').style.display = 'none';
  document.getElementById('userBtns').style.display = 'flex';
}
function showLoggedOut() {
  document.getElementById('sidebarUser').style.display = 'none';
  document.getElementById('authBtns').style.display = 'flex';
  document.getElementById('userBtns').style.display = 'none';
}

// ===== AUTH =====
function showModal(mode) {
  authMode = mode;
  document.getElementById('authModal').classList.add('active');
  document.getElementById('authError').classList.remove('active');
  document.getElementById('authUser').value = '';
  document.getElementById('authPass').value = '';
  if (mode === 'signup') {
    document.getElementById('modalTitle').textContent = 'Sign up';
    document.getElementById('modalSub').textContent = 'Create an account to save your session history.';
    document.getElementById('authSubmit').textContent = 'Sign up';
    document.getElementById('modalSwitch').innerHTML = 'Already have an account? <a onclick="toggleAuthMode()">Log in</a>';
  } else {
    document.getElementById('modalTitle').textContent = 'Log in';
    document.getElementById('modalSub').textContent = 'Welcome back! Enter your credentials.';
    document.getElementById('authSubmit').textContent = 'Log in';
    document.getElementById('modalSwitch').innerHTML = "Don't have an account? <a onclick='toggleAuthMode()'>Sign up</a>";
  }
  setTimeout(() => document.getElementById('authUser').focus(), 100);
}
function hideModal() { document.getElementById('authModal').classList.remove('active'); }
function toggleAuthMode() { showModal(authMode === 'signup' ? 'login' : 'signup'); }

async function submitAuth() {
  const user = document.getElementById('authUser').value.trim();
  const pass = document.getElementById('authPass').value;
  const errEl = document.getElementById('authError');
  if (!user || !pass) { errEl.textContent = 'Fill in all fields'; errEl.classList.add('active'); return; }
  document.getElementById('authSubmit').disabled = true;
  try {
    const res = await fetch('/auth/' + authMode, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; errEl.classList.add('active'); return; }
    token = data.token;
    localUser = data.username;
    localStorage.setItem('mas_token', token);
    localStorage.setItem('mas_user', localUser);
    hideModal(); showLoggedIn(); syncHistoryToServer(); renderHistory();
  } catch { errEl.textContent = 'Network error'; errEl.classList.add('active'); }
  finally { document.getElementById('authSubmit').disabled = false; }
}

function logout() {
  token = null; localUser = null;
  localStorage.removeItem('mas_token');
  localStorage.removeItem('mas_user');
  showLoggedOut(); newChat();
}

// ===== SIDEBAR =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (localHistory.length === 0) {
    list.innerHTML = '<div class="history-empty">No conversations yet</div>';
    return;
  }
  list.innerHTML = localHistory.map(s => `
    <div class="history-item ${s.id === currentSessionId ? 'active' : ''}" onclick="viewSession('${s.id}')">
      <div class="history-goal">${escHtml(s.goal)}</div>
      <div class="history-meta">
        <span class="history-dot ${s.status}"></span>
        <span>${s.completed}/${s.totalTasks} tasks</span>
        <span>·</span>
        <span>${s.elapsed || ''}</span>
      </div>
    </div>
  `).join('');
}

function viewSession(id) {
  const session = localHistory.find(s => s.id === id);
  if (!session) return;
  currentSessionId = id;
  renderHistory();

  const chat = document.getElementById('chatMessages');
  const welcome = document.getElementById('welcomeScreen');
  if (welcome) welcome.style.display = 'none';

  // Remove existing messages but keep welcome
  chat.querySelectorAll('.msg-row').forEach(el => el.remove());

  // Show the conversation
  addUserMessage(session.goal);
  addResultMessage(session);

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function newChat() {
  currentSessionId = null;
  isRunning = false;
  const chat = document.getElementById('chatMessages');
  chat.querySelectorAll('.msg-row').forEach(el => el.remove());
  const welcome = document.getElementById('welcomeScreen');
  if (welcome) welcome.style.display = '';
  document.getElementById('goalInput').value = '';
  renderHistory();
  document.getElementById('goalInput').focus();
}

// ===== AUTO RESIZE TEXTAREA =====
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ===== KEY HANDLER =====
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!isRunning) run();
  }
}

// ===== MESSAGES =====
function addUserMessage(text) {
  const chat = document.getElementById('chatMessages');
  const welcome = document.getElementById('welcomeScreen');
  if (welcome) welcome.style.display = 'none';

  const row = document.createElement('div');
  row.className = 'msg-row msg-user';
  row.innerHTML = `<div class="msg-container">
    <div>
      <div class="msg-label user-label">You</div>
      <div class="msg-bubble">${escHtml(text)}</div>
    </div>
  </div>`;
  chat.appendChild(row);
  scrollToBottom();
}

function addAIMessage(html) {
  const chat = document.getElementById('chatMessages');
  const row = document.createElement('div');
  row.className = 'msg-row msg-ai';
  row.innerHTML = `<div class="msg-container">
    <div style="width:100%">
      <div class="msg-label ai-label">🧠 Agent</div>
      <div class="msg-bubble">${html}</div>
    </div>
  </div>`;
  chat.appendChild(row);
  scrollToBottom();
  return row;
}

function addThinkingMessage() {
  const chat = document.getElementById('chatMessages');
  const row = document.createElement('div');
  row.className = 'msg-row msg-ai';
  row.id = 'thinkingMsg';
  row.innerHTML = `<div class="msg-container">
    <div style="width:100%">
      <div class="msg-label ai-label">🧠 Agent</div>
      <div class="msg-bubble">
        <div class="thinking-block">
          <div class="thinking-header">
            <div class="spinner"></div>
            <span id="thinkingStatus">Planning...</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="step-list" id="stepList"></div>
        </div>
      </div>
    </div>
  </div>`;
  chat.appendChild(row);
  scrollToBottom();
  return row;
}

function addStep(cls, icon, text) {
  const list = document.getElementById('stepList');
  if (!list) return;
  const div = document.createElement('div');
  div.className = 'step-item';
  div.innerHTML = `<span class="step-icon ${cls}">${icon}</span><span>${escHtml(text)}</span>`;
  list.appendChild(div);
  scrollToBottom();
}

function addResultMessage(data) {
  const tasksHtml = (data.steps || []).map(s => `
    <div class="result-task">
      <div class="result-task-header">
        <span class="result-task-dot ${s.status}"></span>
        <span class="result-task-name">#${s.taskId} ${escHtml(s.task)}</span>
        <span class="result-task-type">${s.type}</span>
      </div>
      <div class="result-task-output">${escHtml(s.result || 'No output')}</div>
    </div>
  `).join('');

  const statusColor = data.status === 'completed' ? 'green' : data.status === 'partial' ? 'accent' : 'red';
  const statusLabel = data.status === 'completed' ? '✓ All tasks completed' : data.status === 'partial' ? '⚠ Some tasks failed' : '✗ Execution failed';

  const html = `
    <div class="result-summary">
      <div class="result-stats">
        <div class="result-stat"><div class="result-stat-label">Tasks</div><div class="result-stat-value">${data.totalTasks||0}</div></div>
        <div class="result-stat"><div class="result-stat-label">Passed</div><div class="result-stat-value green">${data.completed||0}</div></div>
        <div class="result-stat"><div class="result-stat-label">Failed</div><div class="result-stat-value red">${data.failed||0}</div></div>
        <div class="result-stat"><div class="result-stat-label">Time</div><div class="result-stat-value accent">${data.elapsed||'—'}</div></div>
      </div>
      <div style="font-size:12px;color:var(--${statusColor});font-weight:500;margin-bottom:10px;">${statusLabel}</div>
      <div class="result-tasks">${tasksHtml}</div>
    </div>
  `;
  addAIMessage(html);
}

function scrollToBottom() {
  const chat = document.getElementById('chatMessages');
  requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
}

// ===== HISTORY =====
function saveToHistoryLocal(data) {
  const session = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    ...data,
    createdAt: new Date().toISOString()
  };
  localHistory.unshift(session);
  if (localHistory.length > 50) localHistory = localHistory.slice(0, 50);
  localStorage.setItem('mas_history', JSON.stringify(localHistory));
  currentSessionId = session.id;
  renderHistory();
  if (token) {
    fetch('/history/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(data)
    }).catch(() => {});
  }
}

async function syncHistoryToServer() {
  if (!token || localHistory.length === 0) return;
  try {
    await fetch('/auth/sync-history', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ sessions: localHistory })
    });
  } catch {}
}

// ===== RUN =====
const goalInput = document.getElementById('goalInput');
const runBtn = document.getElementById('runBtn');

async function run() {
  const goal = goalInput.value.trim();
  if (!goal || isRunning) return;

  isRunning = true;
  runBtn.disabled = true;
  goalInput.value = '';
  goalInput.style.height = 'auto';

  addUserMessage(goal);

  if (abortController) abortController.abort();
  abortController = new AbortController();

  const thinkingRow = addThinkingMessage();
  const startTime = Date.now();
  const completedOutputs = [];
  const stepResults = [];

  try {
    // Plan
    addStep('planning', '🎯', 'Breaking goal into tasks...');
    const planRes = await fetch('/plan', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ goal }), signal: abortController.signal
    });
    if (!planRes.ok) throw new Error('Planning failed');
    const { tasks } = await planRes.json();
    addStep('planning', '📋', `Generated ${tasks.length} task(s)`);
    const statusEl = document.getElementById('thinkingStatus');
    if (statusEl) statusEl.textContent = `Executing ${tasks.length} tasks...`;

    // Execute each
    for (let i = 0; i < tasks.length; i++) {
      const task = tasks[i];
      addStep('task', '▶', `Task #${task.id}: ${task.task}`);
      const pFill = document.getElementById('progressFill');
      if (pFill) pFill.style.width = (((i) / tasks.length) * 100) + '%';

      const execRes = await fetch('/execute-task', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task, previousResults: completedOutputs }),
        signal: abortController.signal
      });

      if (!execRes.ok) {
        const err = await execRes.json().catch(() => ({}));
        addStep('fail', '✗', `Error: ${err.error || execRes.status}`);
        stepResults.push({ taskId: task.id, task: task.task, type: task.type, status: 'failed', attempts: 1, result: err.error || 'failed' });
        continue;
      }

      const d = await execRes.json();
      const passed = d.success;
      const score = d.evaluation?.score || 0;
      addStep(passed ? 'success' : 'fail', passed ? '✓' : '✗', `Score: ${score}/100`);

      if (passed) completedOutputs.push({ taskId: task.id, output: d.output, artifacts: d.artifacts });
      stepResults.push({ taskId: task.id, task: task.task, type: task.type, status: passed ? 'completed' : 'failed', attempts: 1, result: (d.output || '').substring(0, 500) });
      addStep(passed ? 'success' : 'fail', passed ? '✅' : '❌', `Task #${task.id} ${passed ? 'completed' : 'failed'}`);
    }

    // Done
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
    const pFill = document.getElementById('progressFill');
    if (pFill) pFill.style.width = '100%';
    const statusEl2 = document.getElementById('thinkingStatus');
    if (statusEl2) statusEl2.textContent = `Done in ${elapsed}`;

    addStep('success', '🏁', `Completed in ${elapsed}`);

    const failed = stepResults.filter(s => s.status === 'failed').length;
    const status = failed === 0 ? 'completed' : failed < stepResults.length ? 'partial' : 'failed';

    const resultData = {
      goal, status, totalTasks: stepResults.length,
      completed: stepResults.filter(s => s.status === 'completed').length,
      failed, elapsed, steps: stepResults
    };

    // Replace thinking spinner with done indicator
    const spinner = thinkingRow.querySelector('.spinner');
    if (spinner) { spinner.style.borderTopColor = 'var(--green)'; spinner.style.animation = 'none'; }

    // Add result below thinking
    addResultMessage(resultData);
    saveToHistoryLocal(resultData);

  } catch (err) {
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
    if (err.name === 'AbortError') {
      addStep('info', '⏹', 'Cancelled');
    } else {
      addStep('fail', '💥', 'Error: ' + err.message);
    }
    const spinner = thinkingRow.querySelector('.spinner');
    if (spinner) { spinner.style.borderTopColor = 'var(--red)'; spinner.style.animation = 'none'; }
    const statusEl3 = document.getElementById('thinkingStatus');
    if (statusEl3) statusEl3.textContent = 'Error after ' + elapsed;
  } finally {
    isRunning = false;
    runBtn.disabled = false;
    abortController = null;
    goalInput.focus();
  }
}

function escHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
</script>
