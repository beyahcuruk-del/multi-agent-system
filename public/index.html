<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0">
<title>CryptoTerminal AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0a;--bg2:#111;--bg3:#161616;--bg4:#1c1c1c;--bg5:#222;
--t1:#ececec;--t2:#999;--t3:#666;--t4:#444;
--g:#00d26a;--gd:rgba(0,210,106,.12);--r:#ff4757;--rd:rgba(255,71,87,.12);
--a:#6366f1;--ab:#818cf8;--y:#ffd32a;--yd:rgba(255,211,42,.12);
--b:rgba(255,255,255,.06);--bs:rgba(255,255,255,.03);
--f:'Inter',system-ui,sans-serif;--m:'JetBrains Mono',monospace;
--sidebar:220px;
}
html{font-size:13px;-webkit-font-smoothing:antialiased}
body{font-family:var(--f);background:var(--bg);color:var(--t1);height:100vh;height:100dvh;overflow:hidden}

.app{display:grid;grid-template-columns:var(--sidebar) 1fr;height:100vh;height:100dvh}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden}
.sb-brand{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--b)}
.sb-logo{width:30px;height:30px;background:linear-gradient(135deg,var(--a),#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.sb-title{font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--g),var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .15s;color:var(--t3);font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;font-family:var(--f)}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--t2)}
.nav-item.active{background:rgba(99,102,241,.12);color:var(--ab)}
.nav-item .icon{font-size:16px;width:22px;text-align:center}
.sb-footer{padding:12px 16px;border-top:1px solid var(--b);font-size:10px;color:var(--t4);text-align:center}

/* MAIN */
.main{overflow-y:auto;overflow-x:hidden}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:6px}
.page{padding:20px;display:none}
.page.active{display:block}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg3);border:1px solid var(--b);border-radius:10px;padding:14px 16px}
.stat-label{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:18px;font-weight:700;font-family:var(--m)}
.stat-sub{font-size:11px;color:var(--t3);margin-top:4px;font-family:var(--m)}

/* SECTION */
.section{margin-bottom:24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.section-more{font-size:11px;color:var(--a);cursor:pointer;background:none;border:none;font-family:var(--f)}

/* GRID CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.card{background:var(--bg3);border:1px solid var(--b);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s}
.card:hover{border-color:rgba(99,102,241,.3);transform:translateY(-1px)}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.card-img{width:28px;height:28px;border-radius:50%}
.card-name{font-size:13px;font-weight:600}
.card-sym{font-size:10px;color:var(--t4);text-transform:uppercase;font-family:var(--m)}
.card-price{font-size:16px;font-weight:700;font-family:var(--m);margin-bottom:6px}
.card-change{font-size:12px;font-weight:600;font-family:var(--m);padding:2px 8px;border-radius:4px;display:inline-block}
.positive{color:var(--g);background:var(--gd)}
.negative{color:var(--r);background:var(--rd)}
.card-sparkline{height:40px;margin-top:8px}

/* TABLE */
.table-wrap{overflow-x:auto;border:1px solid var(--b);border-radius:10px;background:var(--bg3)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:.4px;padding:10px 12px;text-align:left;border-bottom:1px solid var(--b);cursor:pointer;user-select:none;white-space:nowrap;font-weight:600;position:sticky;top:0;background:var(--bg3);z-index:1}
th:hover{color:var(--t2)}
th .sort-arrow{margin-left:3px;font-size:8px}
td{padding:10px 12px;border-bottom:1px solid var(--bs);font-size:12px;font-family:var(--m);white-space:nowrap}
tr{cursor:pointer;transition:background .1s}
tr:hover{background:rgba(255,255,255,.02)}
.coin-cell{display:flex;align-items:center;gap:8px}
.coin-cell img{width:22px;height:22px;border-radius:50%}
.coin-cell-name{font-family:var(--f);font-weight:600;font-size:12px}
.coin-cell-sym{color:var(--t4);font-size:10px}
.change-badge{padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600}

/* SEARCH */
.search-bar{margin-bottom:16px}
.search-bar input{width:100%;max-width:400px;padding:10px 14px;background:var(--bg3);border:1px solid var(--b);border-radius:8px;color:var(--t1);font-family:var(--f);font-size:13px;outline:none}
.search-bar input:focus{border-color:var(--a)}
.search-bar input::placeholder{color:var(--t4)}

/* CHART AREA */
.trade-header{display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.trade-coin-info{display:flex;align-items:center;gap:12px}
.trade-coin-img{width:36px;height:36px;border-radius:50%}
.trade-coin-name{font-size:20px;font-weight:700}
.trade-coin-sym{font-size:12px;color:var(--t4);text-transform:uppercase;font-family:var(--m)}
.trade-price{font-size:32px;font-weight:700;font-family:var(--m);margin-left:auto}
.trade-change{font-size:16px;font-weight:600;padding:4px 10px;border-radius:6px;font-family:var(--m)}
.back-btn{background:var(--bg3);border:1px solid var(--b);color:var(--t2);padding:8px 14px;border-radius:8px;cursor:pointer;font-family:var(--f);font-size:12px;font-weight:600;transition:all .15s}
.back-btn:hover{background:var(--bg4);color:var(--t1)}
.tf-tabs{display:flex;gap:4px;margin-bottom:16px}
.tf-tab{padding:8px 14px;background:none;border:none;color:var(--t4);font-family:var(--f);font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tf-tab:hover{color:var(--t2)}
.tf-tab.active{color:var(--ab);border-bottom-color:var(--a)}
.chart-container{height:350px;margin-bottom:20px;position:relative}
.chart-container canvas{width:100%!important;height:100%!important}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}

/* AI PANEL */
.ai-box{background:var(--bg3);border:1px solid var(--b);border-radius:10px;padding:16px;margin-bottom:16px}
.ai-box h3{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ai-btn{display:block;width:100%;padding:12px;background:linear-gradient(135deg,var(--a),#8b5cf6);border:none;border-radius:8px;color:#fff;font-family:var(--f);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:12px}
.ai-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,.3)}
.ai-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.ai-result{font-size:12px;line-height:1.7;color:var(--t2);white-space:pre-wrap}
.ai-result strong{color:var(--t1)}
.signal-buy{display:inline-block;padding:2px 8px;border-radius:4px;font-weight:600;font-size:11px;background:var(--gd);color:var(--g)}
.signal-sell{display:inline-block;padding:2px 8px;border-radius:4px;font-weight:600;font-size:11px;background:var(--rd);color:var(--r)}
.signal-hold{display:inline-block;padding:2px 8px;border-radius:4px;font-weight:600;font-size:11px;background:var(--yd);color:var(--y)}
.ai-chat-box{display:flex;gap:8px;margin-top:12px}
.ai-chat-box input{flex:1;padding:10px 12px;background:var(--bg);border:1px solid var(--b);border-radius:8px;color:var(--t1);font-family:var(--f);font-size:12px;outline:none}
.ai-chat-box input:focus{border-color:var(--a)}
.ai-chat-box button{padding:10px 16px;background:var(--a);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:600;cursor:pointer}

/* SIGNALS */
.signal-card{background:var(--bg3);border:1px solid var(--b);border-radius:10px;padding:16px;margin-bottom:10px}
.signal-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.signal-coin{font-size:14px;font-weight:700}
.signal-type{font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px}
.signal-reason{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:8px}
.signal-meta{display:flex;gap:12px;font-size:11px;color:var(--t3)}

/* PORTFOLIO */
.portfolio-form{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.portfolio-form select,.portfolio-form input{padding:10px 12px;background:var(--bg3);border:1px solid var(--b);border-radius:8px;color:var(--t1);font-family:var(--f);font-size:12px;outline:none}
.portfolio-form select:focus,.portfolio-form input:focus{border-color:var(--a)}
.portfolio-form button{padding:10px 16px;background:var(--g);border:none;border-radius:8px;color:#fff;font-weight:600;font-size:12px;cursor:pointer;font-family:var(--f)}
.holding-row{display:grid;grid-template-columns:1fr auto auto auto auto;gap:12px;align-items:center;padding:12px 16px;background:var(--bg3);border:1px solid var(--b);border-radius:10px;margin-bottom:8px}
.holding-name{font-weight:600}
.holding-remove{background:none;border:none;color:var(--r);cursor:pointer;font-size:14px;padding:4px}

/* LOADING */
.spinner{width:16px;height:16px;border:2px solid var(--b);border-top-color:var(--a);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:40px;color:var(--t3);font-size:13px}
.error-box{text-align:center;padding:40px;color:var(--r)}
.error-box button{margin-top:12px;padding:8px 16px;background:var(--bg3);border:1px solid var(--b);border-radius:8px;color:var(--t2);cursor:pointer;font-family:var(--f)}

/* CONFETTI / PULSE */
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* MOBILE */
.mobile-tabs{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg2);border-top:1px solid var(--b);padding:6px 0;padding-bottom:env(safe-area-inset-bottom,6px)}
.mobile-tabs-inner{display:flex;justify-content:space-around}
.m-tab{background:none;border:none;color:var(--t4);font-size:9px;font-family:var(--f);font-weight:600;cursor:pointer;padding:4px 8px;display:flex;flex-direction:column;align-items:center;gap:2px}
.m-tab.active{color:var(--ab)}
.m-tab span{font-size:16px}

@media(max-width:768px){
.app{grid-template-columns:1fr}
.sidebar{display:none}
.page{padding:12px;padding-bottom:70px}
.mobile-tabs{display:block}
.stats-row{grid-template-columns:1fr 1fr}
.chart-container{height:250px}
.trade-price{font-size:24px}
.holding-row{grid-template-columns:1fr auto auto;gap:8px}
}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
<div class="sb-brand"><div class="sb-logo">📊</div><span class="sb-title">CryptoTerminal</span></div>
<nav class="sb-nav">
<button class="nav-item active" onclick="go('dashboard')" id="nav-dashboard"><span class="icon">🏠</span>Dashboard</button>
<button class="nav-item" onclick="go('markets')" id="nav-markets"><span class="icon">📋</span>Markets</button>
<button class="nav-item" onclick="go('trade')" id="nav-trade"><span class="icon">📈</span>Trade</button>
<button class="nav-item" onclick="go('portfolio')" id="nav-portfolio"><span class="icon">💼</span>Portfolio</button>
<button class="nav-item" onclick="go('signals')" id="nav-signals"><span class="icon">🎯</span>AI Signals</button>
</nav>
<div class="footer" style="padding:12px 16px;border-top:1px solid var(--b);font-size:10px;color:var(--t4);text-align:center">Powered by MiMo AI<br>CoinGecko Data</div>
</aside>
<main class="main" id="mainContent">
<div class="page active" id="page-dashboard"></div>
<div class="page" id="page-markets"></div>
<div class="page" id="page-trade"></div>
<div class="page" id="page-portfolio"></div>
<div class="page" id="page-signals"></div>
</main>
</div>

<div class="mobile-tabs"><div class="mobile-tabs-inner">
<button class="m-tab active" onclick="go('dashboard')" id="mt-dashboard"><span>🏠</span>Home</button>
<button class="m-tab" onclick="go('markets')" id="mt-markets"><span>📋</span>Markets</button>
<button class="m-tab" onclick="go('trade')" id="mt-trade"><span>📈</span>Trade</button>
<button class="m-tab" onclick="go('portfolio')" id="mt-portfolio"><span>💼</span>Portfolio</button>
<button class="m-tab" onclick="go('signals')" id="mt-signals"><span>🎯</span>Signals</button>
</div></div>

<script>
// ===== STATE =====
let coins = [];
let globalData = null;
let selectedCoinId = null;
let currentChart = null;
let currentDays = '7';
let holdings = JSON.parse(localStorage.getItem('ct_holdings') || '[]');
let signalHistory = JSON.parse(localStorage.getItem('ct_signals') || '[]');
let chatMessages = [];
let activeSignalTab = 'market';

// ===== INIT =====
loadCoins();
setInterval(loadCoins, 30000);

async function loadCoins() {
  try {
    const res = await fetch('/api/coins');
    if (res.ok) coins = await res.json();
  } catch(e) { console.error(e); }
  // Also load global
  try {
    const res = await fetch('/api/global');
    if (res.ok) { const d = await res.json(); globalData = d.data || d; }
  } catch(e) {}
}

// ===== ROUTING =====
function go(page, param) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.m-tab').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');
  const mtEl = document.getElementById('mt-' + page);
  if (mtEl) mtEl.classList.add('active');

  if (page === 'dashboard') renderDashboard();
  else if (page === 'markets') renderMarkets();
  else if (page === 'trade') { if (param) selectedCoinId = param; renderTrade(); }
  else if (page === 'portfolio') renderPortfolio();
  else if (page === 'signals') renderSignals();
}

// ===== HELPERS =====
function fp(n) { if(!n) return '$0'; if(n>=1) return '$'+n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); if(n>=.01) return '$'+n.toFixed(4); return '$'+n.toFixed(8); }
function fl(n) { if(!n) return '—'; if(n>=1e12) return '$'+(n/1e12).toFixed(2)+'T'; if(n>=1e9) return '$'+(n/1e9).toFixed(2)+'B'; if(n>=1e6) return '$'+(n/1e6).toFixed(2)+'M'; if(n>=1e3) return '$'+(n/1e3).toFixed(1)+'K'; return '$'+n.toLocaleString(); }
function fpc(n) { return (n>=0?'+':'')+(n||0).toFixed(2)+'%'; }
function chgClass(n) { return n>=0?'positive':'negative'; }
function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

// ===== DASHBOARD =====
function renderDashboard() {
  const p = document.getElementById('page-dashboard');
  
  // Stats
  const mcap = globalData?.total_market_cap?.usd || 0;
  const vol = globalData?.total_volume?.usd || 0;
  const btcDom = globalData?.market_cap_percentage?.btc || 0;
  const activeCoins = globalData?.active_cryptocurrencies || 0;

  // Top gainers/losers
  const sorted = [...coins].filter(c => c.price_change_percentage_24h != null);
  const gainers = [...sorted].sort((a,b) => b.price_change_percentage_24h - a.price_change_percentage_24h).slice(0,6);
  const losers = [...sorted].sort((a,b) => a.price_change_percentage_24h - b.price_change_percentage_24h).slice(0,6);
  const top5 = coins.slice(0, 5);

  p.innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Market Cap</div><div class="stat-value">${fl(mcap)}</div></div>
      <div class="stat-card"><div class="stat-label">24h Volume</div><div class="stat-value">${fl(vol)}</div></div>
      <div class="stat-card"><div class="stat-label">BTC Dominance</div><div class="stat-value">${btcDom.toFixed(1)}%</div></div>
      <div class="stat-card"><div class="stat-label">Active Coins</div><div class="stat-value">${activeCoins.toLocaleString()}</div></div>
    </div>

    <div class="section">
      <div class="section-header"><div class="section-title">🔥 Top 5 by Market Cap</div></div>
      <div class="cards-grid">${top5.map(c => `
        <div class="card" onclick="go('trade','${c.id}')">
          <div class="card-top">
            <img class="card-img" src="${c.image}" alt="">
            <div><div class="card-name">${c.name}</div><div class="card-sym">${c.symbol}</div></div>
          </div>
          <div class="card-price">${fp(c.current_price)}</div>
          <span class="card-change ${chgClass(c.price_change_percentage_24h)}">${fpc(c.price_change_percentage_24h)}</span>
        </div>
      `).join('')}</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="section">
        <div class="section-header"><div class="section-title">🚀 Top Gainers</div></div>
        ${gainers.map(c => `
          <div class="card" onclick="go('trade','${c.id}')" style="margin-bottom:6px;padding:10px 14px">
            <div style="display:flex;align-items:center;justify-content:space-between">
              <div style="display:flex;align-items:center;gap:8px">
                <img src="${c.image}" width="20" height="20" style="border-radius:50%">
                <span style="font-weight:600;font-size:12px">${c.name}</span>
                <span style="font-size:10px;color:var(--t4)">${c.symbol.toUpperCase()}</span>
              </div>
              <div style="text-align:right">
                <div style="font-family:var(--m);font-size:12px">${fp(c.current_price)}</div>
                <span class="positive" style="font-size:11px;font-weight:600;padding:1px 5px;border-radius:3px">${fpc(c.price_change_percentage_24h)}</span>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="section">
        <div class="section-header"><div class="section-title">📉 Top Losers</div></div>
        ${losers.map(c => `
          <div class="card" onclick="go('trade','${c.id}')" style="margin-bottom:6px;padding:10px 14px">
            <div style="display:flex;align-items:center;justify-content:space-between">
              <div style="display:flex;align-items:center;gap:8px">
                <img src="${c.image}" width="20" height="20" style="border-radius:50%">
                <span style="font-weight:600;font-size:12px">${c.name}</span>
                <span style="font-size:10px;color:var(--t4)">${c.symbol.toUpperCase()}</span>
              </div>
              <div style="text-align:right">
                <div style="font-family:var(--m);font-size:12px">${fp(c.current_price)}</div>
                <span class="negative" style="font-size:11px;font-weight:600;padding:1px 5px;border-radius:3px">${fpc(c.price_change_percentage_24h)}</span>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ===== MARKETS =====
let sortCol = 'market_cap_rank';
let sortDir = 1;
let searchQuery = '';
let searchTimeout = null;
let searchResults = null; // null = use local coins, array = search results

function renderMarkets() {
  const p = document.getElementById('page-markets');

  p.innerHTML = `
    <div class="search-bar"><input type="text" id="marketsSearch" placeholder="Search any coin (e.g. PEPE, DOGE, BTC)..." value="${esc(searchQuery)}" oninput="onMarketsSearch(this.value)"></div>
    <div id="marketsTableWrap">${renderMarketsTable()}</div>
  `;

  // Restore focus to input if there was a search query
  if (searchQuery) {
    const inp = document.getElementById('marketsSearch');
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }
}

function renderMarketsTable() {
  let list;

  if (searchResults) {
    // Search results from API — merge with local coin data if available
    const coinMap = {};
    coins.forEach(c => coinMap[c.id] = c);
    list = searchResults.map(s => {
      const local = coinMap[s.id];
      return local ? local : {
        id: s.id, name: s.name, symbol: s.symbol,
        market_cap_rank: s.market_cap_rank, image: s.thumb,
        current_price: null, price_change_percentage_24h: null,
        price_change_percentage_1h_in_currency: null,
        price_change_percentage_7d_in_currency: null,
        market_cap: null, total_volume: null
      };
    });
  } else {
    list = coins.filter(c => !searchQuery || c.name.toLowerCase().includes(searchQuery) || c.symbol.toLowerCase().includes(searchQuery));
  }

  list.sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
    return ((va||0) - (vb||0)) * sortDir;
  });

  if (list.length === 0) {
    return '<div style="text-align:center;padding:40px;color:var(--t4)">No coins found.</div>';
  }

  return `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th onclick="toggleSort('market_cap_rank')">#${sortCol==='market_cap_rank'?(sortDir>0?' ▲':' ▼'):''}</th>
          <th>Coin</th>
          <th onclick="toggleSort('current_price')">Price${sortCol==='current_price'?(sortDir>0?' ▲':' ▼'):''}</th>
          <th onclick="toggleSort('price_change_percentage_1h_in_currency')">1h%${sortCol==='price_change_percentage_1h_in_currency'?(sortDir>0?' ▲':' ▼'):''}</th>
          <th onclick="toggleSort('price_change_percentage_24h')">24h%${sortCol==='price_change_percentage_24h'?(sortDir>0?' ▲':' ▼'):''}</th>
          <th onclick="toggleSort('price_change_percentage_7d_in_currency')">7d%${sortCol==='price_change_percentage_7d_in_currency'?(sortDir>0?' ▲':' ▼'):''}</th>
          <th onclick="toggleSort('market_cap')">MCap${sortCol==='market_cap'?(sortDir>0?' ▲':' ▼'):''}</th>
          <th onclick="toggleSort('total_volume')">Volume${sortCol==='total_volume'?(sortDir>0?' ▲':' ▼'):''}</th>
        </tr></thead>
        <tbody>
        ${list.map(c => `
          <tr onclick="go('trade','${c.id}')">
            <td>${c.market_cap_rank||'—'}</td>
            <td><div class="coin-cell"><img src="${c.image}" alt=""><div><div class="coin-cell-name">${c.name}</div><div class="coin-cell-sym">${c.symbol.toUpperCase()}</div></div></div></td>
            <td>${c.current_price!=null?fp(c.current_price):'—'}</td>
            <td><span class="change-badge ${chgClass(c.price_change_percentage_1h_in_currency)}">${fpc(c.price_change_percentage_1h_in_currency)}</span></td>
            <td><span class="change-badge ${chgClass(c.price_change_percentage_24h)}">${fpc(c.price_change_percentage_24h)}</span></td>
            <td><span class="change-badge ${chgClass(c.price_change_percentage_7d_in_currency)}">${fpc(c.price_change_percentage_7d_in_currency)}</span></td>
            <td>${c.market_cap!=null?fl(c.market_cap):'—'}</td>
            <td>${c.total_volume!=null?fl(c.total_volume):'—'}</td>
          </tr>
        `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function updateMarketsTable() {
  const wrap = document.getElementById('marketsTableWrap');
  if (wrap) wrap.innerHTML = renderMarketsTable();
}

function onMarketsSearch(val) {
  searchQuery = val.toLowerCase().trim();
  // Only re-render table body, not the input
  if (!searchQuery) {
    searchResults = null;
    updateMarketsTable();
    return;
  }
  // Debounce API search
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(async () => {
    try {
      const res = await fetch('/api/search?q=' + encodeURIComponent(searchQuery));
      if (res.ok) {
        const data = await res.json();
        searchResults = (data.coins && data.coins.length > 0) ? data.coins : null;
      }
    } catch(e) {
      searchResults = null;
    }
    // If no API results, fall back to local filter
    if (!searchResults) updateMarketsTable();
    else updateMarketsTable();
  }, 400);
  // Immediately show local results while API is loading
  searchResults = null;
  updateMarketsTable();
}

function toggleSort(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  updateMarketsTable();
}

function drawChart(data, isPositive) {
  if (currentChart) { currentChart.destroy(); currentChart = null; }
  const ctx = document.getElementById('tradeChart');
  if (!ctx) return;

  const labels = data.map(p => {
    const d = new Date(p[0]);
    if (currentDays <= 1) return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    if (currentDays <= 7) return d.toLocaleDateString([], {weekday:'short',hour:'2-digit'});
    return d.toLocaleDateString([], {month:'short',day:'numeric'});
  });
  const values = data.map(p => p[1]);
  const color = isPositive ? '#00d26a' : '#ff4757';
  const fill = isPositive ? 'rgba(0,210,106,.08)' : 'rgba(255,71,87,.08)';

  currentChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [{ data: values, borderColor: color, backgroundColor: fill, borderWidth: 2, fill: true, tension: .3, pointRadius: 0, pointHitRadius: 10 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1c1c1c', titleColor: '#999', bodyColor: '#ececec', bodyFont: {family:'JetBrains Mono',size:12}, borderColor: 'rgba(255,255,255,.06)', borderWidth: 1, padding: 10, callbacks: { label: c => '$'+c.parsed.y.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) } } },
      scales: { x: { grid: { color: 'rgba(255,255,255,.03)' }, ticks: { color: '#555', maxTicksLimit: 8, font: {size:10} } }, y: { grid: { color: 'rgba(255,255,255,.03)' }, ticks: { color: '#555', font: {family:'JetBrains Mono',size:10}, callback: v => '$'+v.toLocaleString() } } }
    }
  });
}

async function analyzeTrade() {
  if (!tradeData) return;
  const btn = document.getElementById('analyzeBtn');
  const res = document.getElementById('aiTradeResult');
  btn.disabled = true; btn.textContent = 'Analyzing...';
  res.innerHTML = '<div class="loading" style="padding:16px"><div class="spinner"></div>Analyzing...</div>';

  try {
    const r = await fetch('/api/analyze', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ coin: tradeData.name, price: tradeData.current_price, change24h: tradeData.price_change_percentage_24h?.toFixed(2), change7d: tradeData.price_change_percentage_7d?.toFixed(2), marketCap: tradeData.market_cap, volume: tradeData.total_volume, high24h: tradeData.high_24h, low24h: tradeData.low_24h })
    });
    const data = await r.json();
    let html = esc(data.analysis || 'No analysis');
    html = html.replace(/(Strong Buy|Buy)/g, '<span class="signal-buy">$1</span>');
    html = html.replace(/(Strong Sell|Sell)/g, '<span class="signal-sell">$1</span>');
    html = html.replace(/(Hold)/g, '<span class="signal-hold">$1</span>');
    html = html.replace(/\n/g, '<br>');
    res.innerHTML = '<div class="ai-result">' + html + '</div>';
  } catch(e) {
    res.innerHTML = '<div style="color:var(--r)">Error: ' + e.message + '</div>';
  }
  btn.disabled = false; btn.textContent = '🔄 Re-analyze';
}

async function tradeChat() {
  const input = document.getElementById('tradeChatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  const res = document.getElementById('tradeChatResult');
  chatMessages.push({role:'user', content: text});
  res.innerHTML = '<div class="loading" style="padding:12px"><div class="spinner"></div></div>';

  try {
    const r = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({messages: chatMessages.slice(-10)}) });
    const data = await r.json();
    chatMessages.push({role:'assistant', content: data.content});
    res.innerHTML = chatMessages.slice(-4).reverse().map(m =>
      m.role === 'user'
        ? '<div style="margin-bottom:8px;padding:8px 10px;background:var(--bg4);border-radius:8px;font-size:12px"><strong>You:</strong> ' + esc(m.content) + '</div>'
        : '<div style="margin-bottom:8px;padding:8px 10px;background:var(--bg);border:1px solid var(--b);border-radius:8px;font-size:12px;color:var(--t2);line-height:1.6"><strong style="color:var(--ab)">AI:</strong> ' + esc(m.content) + '</div>'
    ).join('');
  } catch(e) {
    res.innerHTML = '<div style="color:var(--r);font-size:12px">Error: ' + e.message + '</div>';
  }
}

function renderPortfolio() {
  const p = document.getElementById('page-portfolio');

  const holdingsHtml = holdings.map((h, i) => {
    const c = coinMap[h.coinId];
    const currentPrice = c?.current_price || h.buyPrice;

    const cost = h.amount * h.buyPrice;
    const pnl = value - cost;
    const pnlPct = cost > 0 ? ((pnl / cost) * 100) : 0;
    totalValue += value;
    totalCost += cost;
    return `<div class="holding-row">
      <div style="display:flex;align-items:center;gap:8px">
        ${c?.image ? '<img src="'+c.image+'" width="22" height="22" style="border-radius:50%">' : ''}

      <div style="text-align:right"><div style="font-family:var(--m);font-size:12px">${fl(value)}</div><div style="font-size:10px;color:var(--t4)">Value</div></div>
      <div style="text-align:right"><div class="${pnl>=0?'positive':'negative'}" style="font-family:var(--m);font-size:12px;padding:2px 6px;border-radius:4px">${pnl>=0?'+':''}$${pnl.toFixed(2)} (${pnlPct.toFixed(1)}%)</div></div>
      <button class="holding-remove" onclick="removeHolding(${i})">✕</button>
    </div>`;
  }).join('');

  const totalPnl = totalValue - totalCost;
  const totalPnlPct = totalCost > 0 ? (totalPnl / totalCost * 100) : 0;

  // Coin options for dropdown
  const coinOpts = coins.slice(0, 50).map(c => '<option value="'+c.id+'">'+c.name+' ('+c.symbol.toUpperCase()+')</option>').join('');

  p.innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total Value</div><div class="stat-value">${fl(totalValue)}</div></div>
      <div class="stat-card"><div class="stat-label">Total Cost</div><div class="stat-value">${fl(totalCost)}</div></div>

      <div class="stat-card"><div class="stat-label">Holdings</div><div class="stat-value">${holdings.length}</div></div>
    </div>

    <div class="section">
      <div class="section-header"><div class="section-title">➕ Add Holding</div></div>
      <div class="portfolio-form">
        <select id="portCoin">${coinOpts}</select>
        <input type="number" id="portAmount" placeholder="Amount" step="any" min="0">

        <button onclick="addHolding()">Add</button>
      </div>
    </div>

    <div class="section">
      <div class="section-header"><div class="section-title">💼 Holdings</div></div>
      ${holdings.length ? holdingsHtml : '<div style="text-align:center;padding:40px;color:var(--t4)">No holdings yet. Add one above.</div>'}

function addHolding() {
  const coinId = document.getElementById('portCoin').value;
  const amount = parseFloat(document.getElementById('portAmount').value);
  const buyPrice = parseFloat(document.getElementById('portPrice').value);
  if (!coinId || !amount || !buyPrice) return;
  holdings.push({ coinId, amount, buyPrice });
  localStorage.setItem('ct_holdings', JSON.stringify(holdings));
  renderPortfolio();
}

function removeHolding(i) {
  holdings.splice(i, 1);
  localStorage.setItem('ct_holdings', JSON.stringify(holdings));
  renderPortfolio();
}

            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">

              <span style="font-size:10px;color:var(--t4);background:var(--bg);padding:2px 6px;border-radius:4px;text-transform:uppercase">${esc(chainName)}</span>

            <div style="display:flex;align-items:center;gap:6px;margin-top:3px;">
              ${tokenAddr ? `<a href="${solscanLink}" target="_blank" style="font-size:10px;color:var(--ab);font-family:var(--m);text-decoration:none" title="${esc(tokenAddr)}">📝 ${shortAddr}</a>` : ''}
              ${coinData ? `<span style="font-size:11px;color:var(--t3);">$${esc(coinData.price)}</span>` : ''}

        </div>
        <span style="background:${sigBg};color:${sigColor};padding:4px 12px;border-radius:6px;font-size:12px;font-weight:700;font-family:var(--m)">${esc(sig.signal)}</span>
      </div>
      ${coinData ? `
        <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;">
          <span style="background:var(--bg);padding:3px 8px;border-radius:4px;font-size:10px;color:var(--t3);font-family:var(--m)">5m: ${coinData.change5m > 0 ? '+' : ''}${coinData.change5m}%</span>
          <span style="background:var(--bg);padding:3px 8px;border-radius:4px;font-size:10px;color:var(--t3);font-family:var(--m)">1h: ${coinData.change1h > 0 ? '+' : ''}${coinData.change1h}%</span>
          <span style="background:var(--bg);padding:3px 8px;border-radius:4px;font-size:10px;color:var(--t3);font-family:var(--m)">6h: ${coinData.change6h > 0 ? '+' : ''}${coinData.change6h}%</span>
          <span style="background:var(--bg);padding:3px 8px;border-radius:4px;font-size:10px;color:var(--t3);font-family:var(--m)">24h: ${coinData.change24h > 0 ? '+' : ''}${coinData.change24h}%</span>
        </div>
      ` : ''}
      <div style="font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:8px;">${esc(sig.reason)}</div>
      <div style="display:flex;gap:8px;font-size:11px;">
        <div style="background:var(--bg);padding:5px 8px;border-radius:6px;flex:1;text-align:center;">
          <div style="color:var(--t4);margin-bottom:1px;">Confidence</div>
          <div style="color:${confColor};font-weight:600;font-family:var(--m)">${esc(sig.confidence)}</div>
        </div>
        <div style="background:var(--bg);padding:5px 8px;border-radius:6px;flex:1;text-align:center;">
          <div style="color:var(--t4);margin-bottom:1px;">Liquidity</div>
          <div style="color:var(--ab);font-weight:600;font-family:var(--m)">${liqText}</div>
        </div>
        <div style="background:var(--bg);padding:5px 8px;border-radius:6px;flex:1;text-align:center;">
          <div style="color:var(--t4);margin-bottom:1px;">FDV</div>
          <div style="color:var(--ab);font-weight:600;font-family:var(--m)">${fdvText}</div>
        </div>
        <div style="background:var(--bg);padding:5px 8px;border-radius:6px;flex:1;text-align:center;">
          <div style="color:var(--t4);margin-bottom:1px;">Vol 24h</div>
          <div style="color:var(--ab);font-weight:600;font-family:var(--m)">${volText}</div>
        </div>
      </div>
      ${dexLink ? `<div style="margin-top:8px;text-align:right"><a href="${dexLink}" target="_blank" style="font-size:11px;color:var(--ab);text-decoration:none">📊 View on DexScreener →</a></div>` : ''}
    </div>`;
}

async function scanMarket() {
  const btn = document.getElementById('scanBtn');
  const res = document.getElementById('scanResult');
  btn.disabled = true; btn.textContent = '🔍 Scanning...';
  res.innerHTML = '<div class="loading" style="padding:20px"><div class="spinner"></div>AI is analyzing the market...</div>';

  try {
    const top10 = coins.slice(0, 10).map(c => ({
      name: c.name, symbol: c.symbol, current_price: c.current_price,
      price_change_percentage_24h: c.price_change_percentage_24h,
      market_cap: c.market_cap, total_volume: c.total_volume
    }));

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 55000);

    const r = await fetch('/api/signals', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ coins: top10 }),
      signal: controller.signal
    });
    clearTimeout(timeout);
    const data = await r.json();

    // Save to history
    signalHistory.unshift({ time: new Date().toISOString(), signals: data.signals || [] });
    if (signalHistory.length > 20) signalHistory = signalHistory.slice(0, 20);
    localStorage.setItem('ct_signals', JSON.stringify(signalHistory));

    res.innerHTML = (data.signals || []).map(sig => {
      const isBuy = sig.signal === 'Buy' || sig.signal === 'Strong Buy';
      const isSell = sig.signal === 'Sell' || sig.signal === 'Strong Sell';
      const sigColor = isBuy ? 'var(--g)' : isSell ? 'var(--r)' : 'var(--y)';
      const sigBg = isBuy ? 'var(--gd)' : isSell ? 'var(--rd)' : 'var(--yd)';
      const sigIcon = isBuy ? '🟢' : isSell ? '🔴' : '🟡';
      const confColor = sig.confidence === 'High' ? 'var(--g)' : sig.confidence === 'Low' ? 'var(--r)' : 'var(--y)';
      return `
      <div class="signal-card" style="margin-top:12px;background:var(--bg3);border:1px solid var(--b);border-radius:12px;padding:16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:18px">${sigIcon}</span>
            <span style="font-size:16px;font-weight:700">${esc(sig.coin)}</span>
          </div>
          <span style="background:${sigBg};color:${sigColor};padding:4px 12px;border-radius:6px;font-size:12px;font-weight:700;font-family:var(--m)">${esc(sig.signal)}</span>
        </div>
        <div style="font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:10px;">${esc(sig.reason)}</div>
        <div style="display:flex;gap:16px;font-size:11px;">
          <div style="background:var(--bg);padding:6px 10px;border-radius:6px;flex:1;text-align:center;">
            <div style="color:var(--t4);margin-bottom:2px;">Confidence</div>
            <div style="color:${confColor};font-weight:600;font-family:var(--m)">${esc(sig.confidence)}</div>
          </div>
          <div style="background:var(--bg);padding:6px 10px;border-radius:6px;flex:1;text-align:center;">
            <div style="color:var(--t4);margin-bottom:2px;">Target</div>
            <div style="color:var(--ab);font-weight:600;font-family:var(--m)">${esc(sig.target)}</div>
          </div>
        </div>
      </div>`;
    }).join('');

    // Refresh history
    renderSignals();
  } catch(e) {
    res.innerHTML = '<div style="color:var(--r);padding:12px">Error: ' + e.message + '</div>';
  }
  btn.disabled = false; btn.textContent = '🔍 Scan Market Now';
}

async function scanMemeCoins() {
  const btn = document.getElementById('memeBtn');
  const res = document.getElementById('memeResult');
  btn.disabled = true; btn.textContent = '🔍 Scanning DEX...';
  res.innerHTML = '<div class="loading" style="padding:20px"><div class="spinner"></div>Fetching trending meme coins from DexScreener...</div>';

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 65000);

    const r = await fetch('/api/meme-signals', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({}),
      signal: controller.signal
    });
    clearTimeout(timeout);
    const data = await r.json();

    // Save to meme history
    memeHistory.unshift({ time: new Date().toISOString(), signals: data.signals || [], coins: data.memeCoins || [] });
    if (memeHistory.length > 20) memeHistory = memeHistory.slice(0, 20);
    localStorage.setItem('ct_meme_signals', JSON.stringify(memeHistory));

    if (!data.signals || data.signals.length === 0) {
      res.innerHTML = '<div style="color:var(--t3);padding:20px;text-align:center">No trending meme coins found. Try again later.</div>';
    } else {
      res.innerHTML = data.signals.map(sig => renderMemeSignalCard(sig, data.memeCoins)).join('');
    }

    renderSignals();
  } catch(e) {
    res.innerHTML = '<div style="color:var(--r);padding:12px">Error: ' + e.message + '</div>';
  }
  btn.disabled = false; btn.textContent = '🚀 Scan Memecoins Now';
}

// ===== HASH ROUTING =====
function handleHash() {
  const hash = location.hash.slice(1) || 'dashboard';
  const parts = hash.split('/');
  if (parts[0] === 'trade' && parts[1]) go('trade', parts[1]);
  else go(parts[0]);
}
window.addEventListener('hashchange', handleHash);

// Init — wait for data then render
async function init() {
  await Promise.all([loadCoins()]);
  handleHash();
}
init();
</script>
